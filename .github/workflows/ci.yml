name: CI

on:
  push:
    branches: ['**']
    tags:
      - 'v*'
  pull_request:
    branches: ['**']

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Prevent duplicate publish runs for same tag
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pages: write

jobs:
  # ============================================================================
  # Rust Testing
  # ============================================================================
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)" --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Check Rust file line count (SPEC_0021)
        run: cargo run --quiet --bin rum -- check-rust-file-lines --all-files

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v4
        id: msl-cache
        with:
          path: target/msl
          key: msl-v4.1.0-workspace

      - name: Download MSL
        if: steps.msl-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p target/msl
          curl -L -o target/msl/msl-v4.1.0.tar.gz \
            https://github.com/modelica/ModelicaStandardLibrary/archive/refs/tags/v4.1.0.tar.gz
          tar -xzf target/msl/msl-v4.1.0.tar.gz -C target/msl
          rm target/msl/msl-v4.1.0.tar.gz

      - name: Run tests
        run: cargo test --workspace --verbose --exclude rumoca-bind-python --exclude rumoca-bind-wasm

      - name: Build all binaries
        run: cargo build --verbose --bin rumoca --bin rumoca-lsp

  coverage-gate:
    name: Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup component add llvm-tools-preview

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Generate workspace coverage artifacts
        run: |
          cargo run --bin rum -- coverage

      - name: Generate trim candidate inventory
        run: |
          cargo run --bin rum -- coverage-report

      - name: Enforce coverage regression gate
        run: |
          cargo run --bin rum -- coverage-gate --allowed-workspace-line-coverage-drop 6.0

  msl-quality-gate:
    name: MSL Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache MSL
        uses: actions/cache@v4
        id: msl-cache
        with:
          path: target/msl
          key: msl-v4.1.0-workspace

      - name: Download MSL
        if: steps.msl-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p target/msl
          curl -L -o target/msl/msl-v4.1.0.tar.gz \
            https://github.com/modelica/ModelicaStandardLibrary/archive/refs/tags/v4.1.0.tar.gz
          tar -xzf target/msl/msl-v4.1.0.tar.gz -C target/msl
          rm target/msl/msl-v4.1.0.tar.gz

      - name: Install OpenModelica
        shell: bash
        run: |
          set -euo pipefail
          if command -v omc >/dev/null 2>&1; then
            echo "OpenModelica already available:"
            omc --version
            exit 0
          fi
          sudo apt-get update
          sudo apt-get install -y ca-certificates curl gnupg
          sudo curl -fsSL http://build.openmodelica.org/apt/openmodelica.asc | \
            sudo gpg --dearmor -o /usr/share/keyrings/openmodelica-keyring.gpg
          codename="$(
            . /etc/os-release
            echo "${UBUNTU_CODENAME:-${VERSION_CODENAME}}"
          )"
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/openmodelica-keyring.gpg] \
            https://build.openmodelica.org/apt ${codename} stable" | \
            sudo tee /etc/apt/sources.list.d/openmodelica.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends omc
          omc --version

      - name: Resolve OMC parity cache metadata
        id: omc-meta
        shell: bash
        run: |
          set -euo pipefail
          omc_version="$(omc --version | head -n1 | tr -d '\r')"
          omc_version_hash="$(printf '%s' "$omc_version" | sha256sum | cut -c1-16)"
          echo "version=$omc_version" >> "$GITHUB_OUTPUT"
          echo "version_hash=$omc_version_hash" >> "$GITHUB_OUTPUT"
          echo "OMC parity cache key metadata: version='$omc_version' hash=$omc_version_hash"

      - name: Restore OMC parity cache
        id: omc-parity-cache
        uses: actions/cache/restore@v4
        with:
          path: target/msl/results/omc_parity_cache
          key: ${{ runner.os }}-omc-parity-v2-${{ steps.omc-meta.outputs.version_hash }}-${{ hashFiles('crates/rumoca-test-msl/tests/msl_tests/msl_simulation_targets_180.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-omc-parity-v2-${{ steps.omc-meta.outputs.version_hash }}-${{ hashFiles('crates/rumoca-test-msl/tests/msl_tests/msl_simulation_targets_180.json') }}-

      - name: Build MSL gate helper binaries
        run: |
          cargo build --release --package rumoca-test-msl --bin rumoca-sim-worker
          cargo build --release --package rumoca-tool-dev --bin rumoca-msl-tools

      - name: Run full MSL quality gate
        run: |
          RUMOCA_SIM_WORKER_EXE=target/release/rumoca-sim-worker \
          RUMOCA_MSL_TOOLS_EXE=target/release/rumoca-msl-tools \
          RUMOCA_MSL_CACHE_DIR=target/msl \
          cargo test --release --package rumoca-test-msl --test msl_tests \
            balance_pipeline::balance_pipeline_core::test_msl_all -- --ignored --nocapture

      - name: Ensure OMC parity cache directory exists
        if: always()
        run: mkdir -p target/msl/results/omc_parity_cache

      - name: Save OMC parity cache
        if: always() && steps.omc-parity-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: target/msl/results/omc_parity_cache
          key: ${{ runner.os }}-omc-parity-v2-${{ steps.omc-meta.outputs.version_hash }}-${{ hashFiles('crates/rumoca-test-msl/tests/msl_tests/msl_simulation_targets_180.json') }}-${{ github.sha }}

  modelica-fmt:
    name: Modelica Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build and check Modelica formatting
        run: |
          cargo build --release --bin rumoca
          # Check formatting on any .mo test files in the repo (excluding target/)
          find . -path ./target -prune -o -name '*.mo' -print | head -20 | xargs -r ./target/release/rumoca fmt --check

  # ============================================================================
  # Documentation
  # ============================================================================
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Build documentation
        run: cargo doc --workspace --no-deps --exclude rumoca-bind-python --exclude rumoca-bind-wasm
        env:
          RUSTDOCFLAGS: -D warnings

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: target/doc/

  # ============================================================================
  # WebAssembly Build & GitHub Pages
  # ============================================================================
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly with rust-src
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          rustup target add wasm32-unknown-unknown
          rustup component add rust-src

      - name: Install wasm-bindgen-cli (lockfile-matched)
        shell: bash
        run: |
          set -euo pipefail
          WASM_BINDGEN_VERSION="$(
            python3 -c 'import pathlib, tomllib; lock = tomllib.loads(pathlib.Path("Cargo.lock").read_text()); versions = sorted({pkg["version"] for pkg in lock.get("package", []) if pkg.get("name") == "wasm-bindgen"}); assert versions, "Failed to find wasm-bindgen in Cargo.lock"; print(versions[-1])'
          )"
          echo "Installing wasm-bindgen-cli v${WASM_BINDGEN_VERSION} to match Cargo.lock"
          cargo install wasm-bindgen-cli --version "${WASM_BINDGEN_VERSION}" --locked --force

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Run rumoca-bind-wasm Rust tests
        run: cargo test -p rumoca-bind-wasm --verbose

      - name: Build WASM package
        run: |
          cargo build -p rumoca-bind-wasm --lib --release \
            --target wasm32-unknown-unknown

          mkdir -p pkg
          wasm-bindgen \
            --target web \
            --out-dir pkg \
            --out-name rumoca \
            target/wasm32-unknown-unknown/release/rumoca_bind_wasm.wasm

          cp editors/wasm/rumoca_worker.js pkg/
          ls -lh pkg/

      - name: Run WASM simulation regression test
        run: |
          node editors/wasm/tests/simulate_smoke.mjs

      - name: Prepare GitHub Pages content
        run: |
          mkdir -p gh-pages/pkg

          cp pkg/rumoca.js gh-pages/pkg/
          cp pkg/rumoca_bg.wasm gh-pages/pkg/
          cp pkg/rumoca_worker.js gh-pages/pkg/
          cp pkg/index.js gh-pages/pkg/ 2>/dev/null || true
          cp -r pkg/snippets gh-pages/pkg/ 2>/dev/null || true

          find gh-pages/pkg/snippets -name "workerHelpers.js" -exec \
            sed -i "s|import('../../..')|import('../../../rumoca.js')|g" {} \; 2>/dev/null || true

          cp editors/wasm/rumoca.png gh-pages/
          cp editors/wasm/coi-serviceworker.js gh-pages/
          cp -r editors/wasm/src gh-pages/

          sed 's|\.\./\.\./pkg/|./pkg/|g' \
              editors/wasm/index.html > gh-pages/index.html

          echo "=== GitHub Pages content ==="
          find gh-pages -type f

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-package
          path: pkg/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gh-pages/

  deploy-pages:
    name: Deploy to GitHub Pages
    if: startsWith(github.ref, 'refs/tags/v') && github.event_name == 'push'
    needs: [build-wasm]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ============================================================================
  # Release Builds (only on tags)
  # ============================================================================
  build-rust-binaries:
    name: Build Rust (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, modelica-fmt, msl-quality-gate]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: rumoca-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: rumoca-linux-aarch64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            asset_name: rumoca-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            asset_name: rumoca-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: rumoca-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation (Linux ARM64)
        if: matrix.cross
        run: |
          mkdir -p .cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> .cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> .cargo/config.toml

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin rumoca --bin rumoca-lsp

      - name: Strip binaries (Linux native)
        if: runner.os == 'Linux' && !matrix.cross
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Strip binaries (Linux ARM64 cross)
        if: matrix.cross
        run: |
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/rumoca
          aarch64-linux-gnu-strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Strip binaries (macOS)
        if: runner.os == 'macOS'
        run: |
          strip target/${{ matrix.target }}/release/rumoca
          strip target/${{ matrix.target }}/release/rumoca-lsp

      - name: Upload rumoca binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ./target/${{ matrix.target }}/release/rumoca${{ matrix.os == 'windows-latest' && '.exe' || '' }}

      - name: Upload LSP binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}-lsp
          path: ./target/${{ matrix.target }}/release/rumoca-lsp${{ matrix.os == 'windows-latest' && '.exe' || '' }}

  build-python-wheels:
    name: Build Python (${{ matrix.name }})
    if: github.event_name == 'push'
    needs: [lint, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: macos-x86_64
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add target
        if: matrix.target != 'x86_64-pc-windows-msvc'
        run: rustup target add ${{ matrix.target }}

      - name: Install maturin
        run: pip install maturin

      - name: Build wheels
        shell: bash
        run: |
          cd crates/rumoca-bind-python
          if [ "${{ matrix.target }}" = "x86_64-pc-windows-msvc" ]; then
            maturin build --release --out dist
          else
            maturin build --release --out dist --target ${{ matrix.target }}
          fi

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.name }}
          path: crates/rumoca-bind-python/dist

  build-python-sdist:
    name: Build Python sdist
    if: github.event_name == 'push'
    needs: [lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install maturin
        run: pip install maturin

      - name: Build sdist
        run: |
          cd crates/rumoca-bind-python
          maturin sdist --out dist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: crates/rumoca-bind-python/dist

  build-vscode-extension:
    name: Build VS Code Extension (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, test, build-rust-binaries]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: win32-x64
            rust_artifact: rumoca-windows-x86_64.exe-lsp
            binary_name: rumoca-lsp.exe
          - target: darwin-x64
            rust_artifact: rumoca-macos-x86_64-lsp
            binary_name: rumoca-lsp
          - target: darwin-arm64
            rust_artifact: rumoca-macos-aarch64-lsp
            binary_name: rumoca-lsp
          - target: linux-x64
            rust_artifact: rumoca-linux-x86_64-lsp
            binary_name: rumoca-lsp
          - target: linux-arm64
            rust_artifact: rumoca-linux-aarch64-lsp
            binary_name: rumoca-lsp
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download LSP binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.rust_artifact }}
          path: editors/vscode/bin

      - name: Prepare binary
        run: |
          cd editors/vscode/bin
          ls -la
          if [ -f "rumoca-lsp" ] && [ "${{ matrix.binary_name }}" != "rumoca-lsp" ]; then
            mv rumoca-lsp ${{ matrix.binary_name }}
          elif [ -f "rumoca-lsp.exe" ] && [ "${{ matrix.binary_name }}" != "rumoca-lsp.exe" ]; then
            mv rumoca-lsp.exe ${{ matrix.binary_name }}
          fi
          chmod +x ${{ matrix.binary_name }} 2>/dev/null || true
          ls -la

      - name: Install dependencies
        run: |
          cd editors/vscode
          npm ci

      - name: Package extension
        run: |
          cd editors/vscode
          npx @vscode/vsce package --target ${{ matrix.target }} --no-dependencies --no-yarn

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension-${{ matrix.target }}
          path: editors/vscode/*.vsix

  # ============================================================================
  # Publishing (only on tags, after all builds complete)
  # ============================================================================
  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-rust-binaries, build-python-wheels, build-python-sdist, build-vscode-extension, build-wasm, docs]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/rumoca
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main
        run: |
          if ! git merge-base --is-ancestor ${{ github.sha }} origin/main; then
            echo "::error::Tag must point to a commit on the main branch"
            exit 1
          fi
          echo "Tag points to a commit on main"

      - name: Get tag name
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      # Publish workspace crates to crates.io
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain "$(awk -F'"' '/^channel/ { print $2 }' rust-toolchain.toml)"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Publish to crates.io
        run: |
          # Publish in dependency order
          for crate in \
            rumoca-core \
            rumoca-contracts \
            rumoca-ir-ast \
            rumoca-ir-flat \
            rumoca-ir-dae \
            rumoca-eval \
            rumoca-phase-parse \
            rumoca-phase-resolve \
            rumoca-phase-typecheck \
            rumoca-phase-instantiate \
            rumoca-phase-flatten \
            rumoca-phase-structural \
            rumoca-phase-dae \
            rumoca-phase-codegen \
            rumoca-sim-diffsol \
            rumoca-session \
            rumoca-tool-lint \
            rumoca-tool-fmt \
            rumoca-tool-lsp \
            rumoca; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --token ${{ secrets.CARGO_REGISTRY_TOKEN }} || true
            sleep 5  # Allow crates.io to index
          done

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize artifacts
        run: |
          mkdir -p rust-binaries python-dist vscode-ext wasm-dist

          echo "=== Downloaded structure ==="
          find artifacts -type f | head -50

          # Move Rust binaries
          for dir in artifacts/rumoca-*; do
            if [ -d "$dir" ]; then
              echo "Processing Rust artifact: $dir"
              find "$dir" -type f -exec cp {} rust-binaries/ \;
            fi
          done

          # Move Python wheels
          for dir in artifacts/wheels-*; do
            if [ -d "$dir" ]; then
              echo "Processing Python artifact: $dir"
              find "$dir" -type f \( -name "*.whl" -o -name "*.tar.gz" \) -exec cp {} python-dist/ \;
            fi
          done

          # Move VS Code extensions
          for dir in artifacts/vscode-extension-*; do
            if [ -d "$dir" ]; then
              echo "Processing VS Code artifact: $dir"
              find "$dir" -type f -name "*.vsix" -exec cp {} vscode-ext/ \;
            fi
          done

          # Package WASM for release
          if [ -d "artifacts/wasm-package" ]; then
            echo "Processing WASM artifact"
            cd artifacts/wasm-package
            zip -r ../../wasm-dist/rumoca-wasm.zip .
            cd ../..
          fi

          echo "=== Rust binaries ==="
          ls -la rust-binaries/
          echo "=== Python wheels ==="
          ls -la python-dist/
          echo "=== VS Code extension ==="
          ls -la vscode-ext/
          echo "=== WASM package ==="
          ls -la wasm-dist/

      # Create GitHub Release
      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.tag.outputs.name }} \
            --title "Release ${{ steps.tag.outputs.name }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Rust binaries to release
        run: |
          cd rust-binaries
          for file in *; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.tag.outputs.name }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Python wheels to release
        run: |
          cd python-dist
          for file in *.whl *.tar.gz; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.tag.outputs.name }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VS Code extension to release
        run: |
          cd vscode-ext
          for file in *.vsix; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.tag.outputs.name }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload WASM package to release
        run: |
          cd wasm-dist
          for file in *.zip; do
            if [ -f "$file" ]; then
              echo "Uploading $file"
              gh release upload ${{ steps.tag.outputs.name }} "$file" --clobber
            fi
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish to PyPI
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload python-dist/*.whl python-dist/*.tar.gz --skip-existing
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

      # Publish VS Code extension
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish to VS Code Marketplace
        run: |
          cd vscode-ext
          echo "Publishing platform-specific extensions:"
          ls -la *.vsix
          for vsix in *.vsix; do
            echo "Publishing $vsix to VS Code Marketplace..."
            npx @vscode/vsce publish --packagePath "$vsix"
          done
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX Registry
        run: |
          cd vscode-ext
          echo "Publishing platform-specific extensions:"
          ls -la *.vsix
          for vsix in *.vsix; do
            echo "Publishing $vsix to Open VSX..."
            npx ovsx publish "$vsix" -p ${{ secrets.OVSX_TOKEN }}
          done
